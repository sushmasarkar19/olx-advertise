spring.application.name=olx-advertise

spring.datasource.url=jdbc:mysql://localhost:3306/olxadvertise
spring.datasource.username=root
spring.datasource.password=test

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


# OLX Login service base URL (for token validation)
olx.login.service.url=http://localhost:8081/olx

# OLX Masterdata service base URL (for category and status lookups)
olx.masterdata.service.url=http://localhost:8082


# Enable Feign fallbacks via Spring Cloud CircuitBreaker
feign.circuitbreaker.enabled=true

# Feign full logging - shows exact request/response bodies to/from masterdata and login
feign.client.config.default.loggerLevel=FULL
logging.level.com.sushma.olxadvertise.client=DEBUG
logging.level.com.sushma.olxadvertise.client.helper=DEBUG
